<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Session Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:linear-gradient(90deg,#fff7ad,#ffa9f9);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.panel{

background:rgba(255,255,255,0.35);
backdrop-filter:blur(12px);

padding:40px;

border-radius:20px;

width:520px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
margin-bottom:10px;
}

.session-name{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.timer{

font-size:48px;

font-weight:bold;

margin:20px 0;

color:#000;
}

.notice{

background:#fff3cd;

padding:15px;

border-radius:10px;

margin-top:20px;

font-weight:bold;
}

.status{

color:green;

margin-top:10px;
font-weight:bold;
}

.info{
margin-top:10px;
font-size:16px;
}

</style>

<script>

let seconds = {{ remaining }};

function updateTimer(){

if(seconds <= 0){

document.getElementById("timer").innerHTML="EXPIRED";

alert("Session Expired");

window.location.href="/";

return;
}

let hrs = Math.floor(seconds/3600);

let min = Math.floor((seconds%3600)/60);

let sec = seconds%60;

document.getElementById("timer").innerHTML =
String(hrs).padStart(2,'0')
+
":"
+
String(min).padStart(2,'0')
+
":"
+
String(sec).padStart(2,'0');

seconds--;

}

setInterval(updateTimer,1000);

function loadNotice(){

fetch("/get-notice/")
.then(res => res.json())
.then(data => {

document.getElementById(
"notice-text"
).innerHTML = data.message;

});

}

setInterval(loadNotice,5000);

</script>

</head>

<body onload="updateTimer();loadNotice();">

<div class="panel">

<h2>Welcome {{ student.name }}</h2>

<div class="session-name">
📚 {{ session.title }}
</div>

<div class="info">
Registration No: {{ student.registration_number }}
</div>

<p class="status">
🟢 Session Active
</p>

<div
id="timer"
class="timer">
Loading...
</div>

<div class="notice">

📢 Admin Notice

<br><br>

<span id="notice-text">
Loading...
</span>

</div>
</div>

</body>
</html>
