<!DOCTYPE html>
<html>

<head>

<title>Create Session</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
width:450px;
max-width:100%;
}

h2{
text-align:center;
margin-bottom:25px;
color:#0f172a;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.code-box{
margin-top:25px;
padding:20px;
background:#dbeafe;
border-radius:12px;
text-align:center;
}

.code{
font-size:30px;
font-weight:bold;
color:#1d4ed8;
margin-top:10px;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#0f172a;
color:white;
padding:10px 15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<a href="/dashboard/" class="back">
🏠 Dashboard
</a>

<h2>📚 Create New Session</h2>

<form method="post">

{% csrf_token %}

<input
name="title"
placeholder="Class Title"
required>

<input
name="duration"
type="number"
placeholder="Duration (Minutes)"
required>

<button type="submit">
Create Session
</button>

</form>

{% if code %}

<div class="code-box">

<h3>Session Created Successfully</h3>

<div class="code">
{{ code }}
</div>

<p style="margin-top:10px;">
Share this code with students to join the session.
</p>

</div>

{% endif %}

</div>

</body>

</html>
